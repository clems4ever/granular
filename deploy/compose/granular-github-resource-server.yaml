# GitHub-resource server config for the docker-compose example.
# Secrets are mounted by compose under /run/secrets (see docker-compose.yml).

addr: ":8080"

# This resource server's id must match an entry in the AS's `resource_servers:` list, and as_url points
# at the AS over the compose network (service name "auth-server").
resource_server_id: "github-resource-server"
as_url: "http://auth-server:9090"

# Shared HMAC secret — the SAME secret the AS holds for this resource_server_id. The resource server
# signs grant requests and authenticates verify calls with it.
secret_file: "/run/secrets/granular_resource_server_github_secret"

# GitHub personal access token used to execute github.* operations.
github_token_file: "/run/secrets/granular_github_token"
