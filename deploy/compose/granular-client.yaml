# Client config for the docker-compose example (used by the optional "client" service).
# The client talks to the AS and the resource server over the compose network.

as_url: "http://auth-server:9090"

# The subject token the client attaches proposals and operations to. Mint it first with
# the granular-subject CLI (see docker-compose.yml header), write it to
# .secrets/granular_subject_token, then run client commands.
token_file: "/run/secrets/granular_subject_token"

resource_servers:
  - id: "github-resource-server"
    base_url: "http://resource-server:8080"
