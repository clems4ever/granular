name: ci

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Build + test runs once per event and gates the release below.
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the refreshed coverage badge back to main
      pull-requests: write # post the coverage comment on a PR
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify formatting
        run: |
          unformatted=$(gofmt -l internal/ cmd/)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test with coverage
        run: go test -covermode=atomic -coverprofile=coverage.out ./...

      # Render the per-function coverage and surface the module total in the job
      # summary (shown on the PR's Checks tab) so coverage is checkable without
      # downloading anything.
      - name: Coverage report
        id: cov
        run: |
          go tool cover -func=coverage.out -o coverage-func.txt
          total=$(grep '^total:' coverage-func.txt | awk '{print $NF}')
          echo "total=${total}" >> "$GITHUB_OUTPUT"
          {
            echo "## Coverage: ${total}"
            echo ""
            echo "<details><summary>Per-function coverage</summary>"
            echo ""
            echo '```'
            cat coverage-func.txt
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "Total coverage: ${total}"

      # On a pull request, post (or update) a single sticky comment with the
      # coverage total so it shows in the PR conversation. Uses the built-in token
      # and runs only for same-repo PRs (a fork PR gets a read-only token).
      - name: Comment coverage on PR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        env:
          TOTAL: ${{ steps.cov.outputs.total }}
        with:
          script: |
            const marker = '<!-- coverage-report -->';
            const run = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              marker,
              `### Coverage: ${process.env.TOTAL}`,
              '',
              `The full line-by-line HTML report is attached as the **coverage** artifact on [this run](${run}).`,
            ].join('\n');
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      # On a push to main, refresh the self-hosted README badge and commit it back.
      # `[skip ci]` keeps the bot commit from triggering another run, and the
      # commit is made only when the badge actually changed.
      - name: Update coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          scripts/coverage-badge.sh "${{ steps.cov.outputs.total }}" .github/badges/coverage.svg
          if [ -n "$(git status --porcelain .github/badges/coverage.svg)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .github/badges/coverage.svg
            git commit -m "ci: update coverage badge to ${{ steps.cov.outputs.total }} [skip ci]"
            git push
          else
            echo "coverage badge unchanged"
          fi

      # A browsable, line-by-line HTML report uploaded as a build artifact, so the
      # full coverage detail can be downloaded from the run.
      - name: Generate HTML coverage report
        run: go tool cover -html=coverage.out -o coverage.html

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            coverage.out
            coverage.html
            coverage-func.txt
          if-no-files-found: error

      # Lints the served OpenAPI specs (valid OpenAPI 3) and guards against
      # spec/code drift: every documented path+method must be a real route.
      - name: Validate OpenAPI specs
        run: go test ./... -run OpenAPI -count=1

  # Only runs on a v* tag, and only once the test job is green. GoReleaser builds
  # each binary once and packages it into both the release archives and the Docker
  # images, so nothing is compiled twice.
  release:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
