<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{block "title" .Page}}granular · authorization server{{end}}</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="/"><img class="brand-logo" src="/static/favicon.svg" width="24" height="24" alt=""> granular <span class="muted" style="font-weight:500">· authorization</span></a>
      <nav class="nav">
        {{if .Nav.AuthEnabled}}
        {{if .Nav.User}}<span class="nav-user" title="Signed in">{{.Nav.User}}</span>{{end}}
        <form class="logout-form" action="/auth/github/logout" method="post">
          <button type="submit" class="logout-btn">Sign out</button>
        </form>
        {{end}}
      </nav>
    </div>
  </header>
  <main class="container{{block "container-class" .Page}}{{end}}">
    {{block "content" .Page}}{{end}}
  </main>
  <footer class="footer">granular · authorization server — the policy authority that approves and verifies operations · <a href="/docs">API reference</a></footer>
</body>
</html>
