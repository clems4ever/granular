# granular-github CLI configuration.
# Copy to github-client.yaml (the default path; override with --config) and edit.
#
# granular-github is a dedicated client for the GitHub resource server (RS). It
# catalogs the RS's permission schema (`catalog`), builds and has the RS sign a
# grant request (`sign`, whose output you submit with `granular propose`), and
# runs GitHub operations (`clone`, `issue create`, `pull merge`, ...) once a
# subject holds the necessary grants. It never talks to the authorization server.

# The GitHub resource server's base URL. Override per-invocation with --base-url.
base_url: "http://localhost:9091"

# The subject token operations run under (the bearer credential). Never store it
# inline — point at a file holding it. `catalog` and `sign` need no token; only
# running operations does. Mint a token with `granular-subject create`, or (when
# running inside an llmbox) read the one injected at ~/.granular/subject_token.
# Override per-invocation with --token.
token_file: "/run/secrets/granular_subject_token"
