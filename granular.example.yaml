# granular server configuration.
# Copy to granular.yaml (the default path; override with --config) and edit.
# Every field is optional; omitted values fall back to the defaults shown here.

# HTTP listen address.
addr: ":8080"

# Externally reachable base URL. Used to build approval links and the OAuth
# callback URL. Defaults to http://localhost<addr>.
base_url: "http://localhost:8080"

# Directory holding the bbolt database. Defaults to a temp directory.
workspace: "/var/lib/granular"

# Database file path. Defaults to <workspace>/granular.db.
db: ""

# How often expired grants are purged in the background.
cleanup_interval: "2m"

# Secrets are never stored in this file: point at a file that holds the secret
# (e.g. a Docker/Kubernetes secret mount). Leave empty to omit the secret.

# Path to a file holding the GitHub PAT used for github.* operations and the git
# proxy.
github_token_file: "/run/secrets/granular_github_token"

# Web-UI authentication. When client_id and the client-secret file are both set,
# the human pages (approval, grants, catalog, landing) require a "log in with
# GitHub" and admit only the users in allowed_users. The CLI API and git proxy are
# unaffected.
auth:
  # Register a GitHub OAuth App and set its callback URL to <base_url>/auth/callback.
  # The client id is public, so it stays inline.
  client_id: ""
  # Path to a file holding the OAuth App client secret.
  client_secret_file: "/run/secrets/granular_oauth_client_secret"
  # GitHub logins allowed to sign in. Empty => everyone is denied (fail closed).
  allowed_users:
    - clems4ever
  # Path to a file holding the HMAC key for session cookies. If empty, a random
  # key is generated each start, which invalidates existing sessions on restart.
  session_secret_file: ""
