# GoReleaser configuration: builds two independent artifacts — the granular CLI
# and the granular server — each archived on its own so a release ships one
# bundle per binary (per OS/arch). See https://goreleaser.com.
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: granular
    main: ./cmd/granular
    binary: granular
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}

  - id: granular-server
    main: ./cmd/granular-server
    binary: granular-server
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}

archives:
  - id: granular
    ids:
      - granular
    name_template: "granular_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE*
      - README*

  - id: granular-server
    ids:
      - granular-server
    name_template: "granular-server_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE*
      - README*

# Docker images reuse the binaries built above (one per OS/arch) — they are not
# recompiled. dockers_v2 builds each image for both platforms and pushes a
# multi-arch manifest automatically.
dockers_v2:
  - id: granular
    ids:
      - granular
    dockerfile: Dockerfile.cli
    images:
      - ghcr.io/clems4ever/granular
    platforms:
      - linux/amd64
      - linux/arm64
    tags:
      - "{{ .Version }}"
      - latest
    labels:
      org.opencontainers.image.source: https://github.com/clems4ever/granular
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"

  - id: granular-server
    ids:
      - granular-server
    dockerfile: Dockerfile.server
    images:
      - ghcr.io/clems4ever/granular-server
    platforms:
      - linux/amd64
      - linux/arm64
    tags:
      - "{{ .Version }}"
      - latest
    labels:
      org.opencontainers.image.source: https://github.com/clems4ever/granular
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  draft: false
  prerelease: auto
