# GoReleaser configuration. granular ships as five independent binaries — the
# client CLI, the authorization server, the GitHub resource server, the subject admin
# CLI, and the GitHub resource-server CLI — each archived on its own so a release
# ships one bundle per binary (per OS/arch). The three deployable services/clients
# also get Docker images.
# See https://goreleaser.com.
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: granular-client
    main: ./cmd/granular-client
    binary: granular-client
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}

  - id: granular-auth-server
    main: ./cmd/granular-auth-server
    binary: granular-auth-server
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}

  - id: granular-github-resource-server
    main: ./cmd/granular-github-resource-server
    binary: granular-github-resource-server
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}

  - id: granular-subject
    main: ./cmd/granular-subject
    binary: granular-subject
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}

  - id: granular-github
    main: ./cmd/granular-github
    binary: granular-github
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}

archives:
  - id: granular-client
    ids: [granular-client]
    name_template: "granular-client_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files: [LICENSE*, README*]

  - id: granular-auth-server
    ids: [granular-auth-server]
    name_template: "granular-auth-server_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files: [LICENSE*, README*]

  - id: granular-github-resource-server
    ids: [granular-github-resource-server]
    name_template: "granular-github-resource-server_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files: [LICENSE*, README*]

  - id: granular-subject
    ids: [granular-subject]
    name_template: "granular-subject_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files: [LICENSE*, README*]

  - id: granular-github
    ids: [granular-github]
    name_template: "granular-github_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files: [LICENSE*, README*]

# Docker images reuse the binaries built above (one per OS/arch) — they are not
# recompiled. dockers_v2 builds each image for both platforms and pushes a
# multi-arch manifest automatically.
dockers_v2:
  - id: granular-client
    ids: [granular-client]
    dockerfile: Dockerfile.client
    images:
      - ghcr.io/clems4ever/granular-client
    platforms: [linux/amd64, linux/arm64]
    tags: ["{{ .Version }}", latest]
    labels:
      org.opencontainers.image.source: https://github.com/clems4ever/granular
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"

  - id: granular-auth-server
    ids: [granular-auth-server]
    dockerfile: Dockerfile.auth-server
    images:
      - ghcr.io/clems4ever/granular-auth-server
    platforms: [linux/amd64, linux/arm64]
    tags: ["{{ .Version }}", latest]
    labels:
      org.opencontainers.image.source: https://github.com/clems4ever/granular
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"

  - id: granular-github-resource-server
    ids: [granular-github-resource-server]
    dockerfile: Dockerfile.resource-server
    images:
      - ghcr.io/clems4ever/granular-github-resource-server
    platforms: [linux/amd64, linux/arm64]
    tags: ["{{ .Version }}", latest]
    labels:
      org.opencontainers.image.source: https://github.com/clems4ever/granular
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  draft: false
  prerelease: auto
