# granular client configuration.
# Copy to granular-client.yaml (the default path; override with --config) and edit.
#
# The client talks to one or more gateways and the authorization server (AS). It
# catalogs the gateways' permission schemas, runs operations (executed when the policy
# authorizes them), and builds grant requests it submits to the AS for human approval.

# The authorization server base URL (where proposals are submitted and policies live).
as_url: "http://localhost:9090"

# The policy token is the bearer credential proposals and operations are made under.
# Never store it inline — point at a file holding it. Policy lifecycle is an admin
# concern: mint a token with `granular-policy create` and hand it to the client. Omit to
# run unauthenticated commands like `catalog`, or pass --token.
token_file: "/run/secrets/granular_policy_token"

# The gateways this client knows about. Each has a stable id (used to target it) and the
# base URL it is reached at. Add one block per gateway (e.g. a future gateway-gitlab).
gateways:
  - id: "github-gateway"
    base_url: "http://localhost:8080"
