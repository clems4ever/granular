# granular client configuration.
# Copy to granular-client.yaml (the default path; override with --config) and edit.
#
# The client talks to one or more resource servers and the authorization server (AS). It
# catalogs the resource servers' permission schemas, runs operations (executed when the policy
# authorizes them), and builds grant requests it submits to the AS for human approval.

# The authorization server base URL (where proposals are submitted and subjects live).
as_url: "http://localhost:9090"

# The subject token is the bearer credential proposals and operations are made under.
# Never store it inline — point at a file holding it. Subject lifecycle is an admin
# concern: mint a token with `granular-subject create` and hand it to the client. Omit to
# run unauthenticated commands like `catalog`, or pass --token.
token_file: "/run/secrets/granular_subject_token"

# The resource servers this client knows about. Each has a stable id (used to target it) and the
# base URL it is reached at. Add one block per resource server (e.g. a future resource server-gitlab).
resource_servers:
  - id: "github-resource-server"
    base_url: "http://localhost:8080"
